<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Spacebook · Artist Dashboard</title>
<link rel="stylesheet" href="/assets/css/styles.css">
<style>
  html, body { background: #000 !important; margin: 0; padding: 0; color: #fff; font-family: Arial, sans-serif; overflow-x: hidden; }
  #starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #000; }
  .navbar { width: 100%; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.65); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; box-sizing: border-box; }
  .navbar .logo { color: #ff6a00; text-decoration: none; font-size: 20px; font-weight: bold; }
  .nav-links { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .nav-links a { color: #ccc; text-decoration: none; font-size: 13px; }
  .nav-links a:hover { color: #ff6a00; }

  .artist-page { max-width: 900px; margin: 30px auto; padding: 0 16px; }
  .artist-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
  .artist-header h1 { color: #ff6a00; font-size: 28px; }
  .verified-badge { background: linear-gradient(135deg,#ff6a00,#ee0979); color: #fff; font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 20px; }
  .artist-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

  .panel { background: #111; padding: 20px; border-radius: 10px; border: 1px solid #333; margin-bottom: 20px; }
  .panel h2 { color: #ff6a00; margin-bottom: 10px; }
  .panel input, .panel textarea { width: 100%; padding: 10px; margin: 6px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box; }
  .panel button { background: #ff6a00; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; color: #000; }
  .stats-box { display: flex; gap: 20px; margin-bottom: 20px; }
  .stat { background: #222; padding: 16px; border-radius: 8px; flex: 1; text-align: center; border: 1px solid #333; }
  .stat-number { font-size: 24px; color: #ff6a00; font-weight: bold; }
  .list-box { margin-top: 0; }
  .track-item, .show-item, .fan-msg-item { background: #222; padding: 12px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  .del-btn { background: none; border: none; color: #ff6a00; cursor: pointer; font-size: 16px; }

  .search-row { display: flex; gap: 8px; margin-bottom: 0; }
  .search-row input { margin: 0; flex: 1; }
  .search-row button { margin: 0; white-space: nowrap; }
  .artist-result { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 14px 16px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .artist-result-info .ar-name { font-weight: 700; color: #ff6a00; font-size: 15px; }
  .artist-result-info .ar-genre { font-size: 12px; color: #888; margin-top: 2px; }
  .artist-result-info .ar-bio { font-size: 13px; color: #bbb; margin-top: 4px; }
  .artist-result-btns { display: flex; gap: 8px; flex-shrink: 0; }
  .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
  .btn-sm-orange { background: #ff6a00; color: #000; }
  .btn-sm-ghost { background: none; border: 1px solid #ff6a00; color: #ff6a00; }
  .msg-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; align-items: center; justify-content: center; }
  .msg-modal.open { display: flex; }
  .msg-modal-box { background: #111; border: 1px solid #444; border-radius: 10px; padding: 24px; width: 90%; max-width: 400px; }
  .msg-modal-box h3 { color: #ff6a00; margin: 0 0 12px; }
  .msg-modal-box textarea { width: 100%; background: #222; border: 1px solid #444; color: #fff; border-radius: 6px; padding: 10px; font-size: 14px; height: 100px; box-sizing: border-box; resize: vertical; }
  .msg-modal-btns { display: flex; gap: 8px; margin-top: 10px; justify-content: flex-end; }
</style>
</head>
<body>

<canvas id="starfield"></canvas>
<script>
  const canvas = document.getElementById("starfield");
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  window.addEventListener("resize", () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
  const stars = Array.from({ length: 200 }, () => ({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, r: Math.random() * 1.5 + 0.3, alpha: Math.random(), speed: Math.random() * 0.3 + 0.1 }));
  const shootingStars = [];
  function spawnShootingStar() { shootingStars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height * 0.5, len: Math.random() * 120 + 80, speed: Math.random() * 8 + 6, angle: Math.PI / 4, alpha: 1 }); }
  setInterval(spawnShootingStar, 2500);
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#000"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.alpha += s.speed * 0.02 * (Math.random() > 0.5 ? 1 : -1);
      s.alpha = Math.max(0.1, Math.min(1, s.alpha));
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255,255,255," + s.alpha + ")"; ctx.fill();
    });
    for (let i = shootingStars.length - 1; i >= 0; i--) {
      const s = shootingStars[i];
      ctx.beginPath(); ctx.moveTo(s.x, s.y);
      ctx.lineTo(s.x - Math.cos(s.angle) * s.len, s.y - Math.sin(s.angle) * s.len);
      const grad = ctx.createLinearGradient(s.x, s.y, s.x - Math.cos(s.angle) * s.len, s.y - Math.sin(s.angle) * s.len);
      grad.addColorStop(0, "rgba(255,150,50," + s.alpha + ")");
      grad.addColorStop(1, "rgba(255,150,50,0)");
      ctx.strokeStyle = grad; ctx.lineWidth = 2; ctx.stroke();
      s.x += Math.cos(s.angle) * s.speed; s.y += Math.sin(s.angle) * s.speed;
      s.alpha -= 0.015;
      if (s.alpha <= 0) shootingStars.splice(i, 1);
    }
    requestAnimationFrame(draw);
  }
  draw();
</script>

<nav class="navbar">
  <a class="logo" href="/feed">Spacebook</a>
  <div class="nav-links">
    <a href="/home">Home</a>
    <a href="/feed">Feed</a>
    <a href="/profile">Profile</a>
    <a href="/messages">Messages</a>
    <a href="/gallery">Gallery</a>
    <a href="/stories">Stories</a>
    <a href="/listen-together">Listen Together</a>
    <a href="/artist-dashboard" style="color:#ff6a00">Artist</a>
    <a href="/activity">Activity</a>
    <a href="/logout">Log Out</a>
  </div>
</nav>

<!-- Fan Message Modal -->
<div class="msg-modal" id="msg-modal">
  <div class="msg-modal-box">
    <h3>Send Fan Message</h3>
    <textarea id="msg-modal-text" placeholder="Write your message..."></textarea>
    <div class="msg-modal-btns">
      <button class="btn-sm btn-sm-ghost" onclick="closeMsgModal()">Cancel</button>
      <button class="btn-sm btn-sm-orange" onclick="submitFanMessage()">Send</button>
    </div>
  </div>
</div>

<div class="artist-page">

  <!-- SEARCH ARTISTS (always visible) -->
  <div class="panel">
    <h2>&#127908; Find Artists</h2>
    <div class="search-row">
      <input type="text" id="artist-search-input" placeholder="Search by name or genre..." onkeydown="if(event.key==='Enter') searchArtists()"/>
      <button onclick="searchArtists()">Search</button>
    </div>
    <div id="artist-search-results"></div>
  </div>

  <!-- ENABLE PANEL -->
  <div id="enable-panel" class="panel" style="display:none;">
    <h2>Become an Artist</h2>
    <input id="en-genre" placeholder="Genre">
    <textarea id="en-bio" placeholder="Artist Bio"></textarea>
    <input id="en-sc" placeholder="SoundCloud Profile URL">
    <input id="en-sp" placeholder="Spotify Profile URL">
    <input id="en-tip" placeholder="Tip Jar URL">
    <button onclick="enableArtistMode()">Enable Artist Mode</button>
  </div>

  <!-- DASHBOARD -->
  <div id="artist-dashboard" style="display:none;">

    <div class="artist-header">
      <h1 id="dash-name">Artist Dashboard</h1>
      <span id="dash-verified" class="verified-badge" style="display:none;">VERIFIED</span>
    </div>

    <div class="stats-box">
      <div class="stat"><div class="stat-number" id="stat-tracks">0</div>Tracks</div>
      <div class="stat"><div class="stat-number" id="stat-shows">0</div>Shows</div>
      <div class="stat"><div class="stat-number" id="stat-msgs">0</div>Messages</div>
    </div>

    <div class="panel">
      <h2>Edit Profile</h2>
      <input id="edit-genre" placeholder="Genre">
      <textarea id="edit-bio" placeholder="Bio"></textarea>
      <input id="edit-sc" placeholder="SoundCloud URL">
      <input id="edit-sp" placeholder="Spotify URL">
      <input id="edit-tip" placeholder="Tip URL">
      <button onclick="saveSettings()">Save</button>
    </div>

    <div class="panel">
      <h2>Import Track</h2>
      <input id="import-url" placeholder="SoundCloud Track URL">
      <button onclick="importTrack()">Import</button>
    </div>

    <div class="panel list-box">
      <h2>Tracks</h2>
      <div id="tracks-list"></div>
    </div>

    <div class="panel">
      <h2>Add Show</h2>
      <input id="show-venue" placeholder="Venue">
      <input id="show-city" placeholder="City">
      <input id="show-date" type="date">
      <input id="show-ticket" placeholder="Ticket URL">
      <button onclick="addShow()">Add Show</button>
    </div>

    <div class="panel list-box">
      <h2>Upcoming Shows</h2>
      <div id="shows-list"></div>
    </div>

    <div class="panel list-box">
      <h2>Fan Messages</h2>
      <div id="fan-msgs-list"></div>
    </div>

  </div>
</div>

<script src="/modules/artist-client.js"></script>
</body>
</html>
