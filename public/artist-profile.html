<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Spacebook · Artist Profile</title>
<link rel="stylesheet" href="/assets/css/styles.css"/>
<style>
  html, body {
    background:#000;
    margin:0;
    padding:0;
    color:#fff;
    font-family:Arial,sans-serif;
    overflow-x:hidden;
  }

  .navbar {
    width:100%;
    padding:14px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(0,0,0,0.65);
    backdrop-filter:blur(10px);
    position:sticky;
    top:0;
    z-index:100;
    box-sizing:border-box;
  }
  .navbar .logo {
    color:#ff6a00;
    text-decoration:none;
    font-size:20px;
    font-weight:bold;
  }
  .nav-links {
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
  }
  .nav-links a {
    color:#ccc;
    text-decoration:none;
    font-size:13px;
  }
  .nav-links a:hover { color:#ff6a00; }

  .artist-page {
    max-width:860px;
    margin:30px auto;
    padding:0 16px;
    box-sizing:border-box;
  }

  .artist-header {
    display:flex;
    align-items:center;
    gap:16px;
    margin-bottom:20px;
  }
  .artist-avatar {
    width:80px;
    height:80px;
    border-radius:50%;
    border:3px solid #ff6a00;
    object-fit:cover;
    background:#222;
  }
  .artist-name {
    font-size:24px;
    font-weight:900;
    color:#fff;
  }
  .artist-genre {
    font-size:13px;
    color:#aaa;
    margin-top:4px;
  }
  .verified-badge {
    display:inline-block;
    background:#ff6a00;
    color:#000;
    font-size:11px;
    font-weight:700;
    padding:2px 8px;
    border-radius:20px;
    margin-left:8px;
    vertical-align:middle;
  }

  .artist-bio {
    font-size:14px;
    color:#ddd;
    margin-top:10px;
    line-height:1.5;
  }

  .section-label {
    font-weight:700;
    color:#ff6a00;
    margin:24px 0 12px;
    font-size:15px;
  }
  .track-item,
  .show-item {
    padding:10px 12px;
    border-radius:8px;
    border:1px solid rgba(255,255,255,0.08);
    margin-bottom:8px;
    background:rgba(255,255,255,0.02);
  }

  .stats-row {
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    margin-top:18px;
  }
  .stat-box {
    flex:1;
    min-width:110px;
    background:rgba(255,106,0,0.07);
    border:1px solid rgba(255,106,0,0.2);
    border-radius:10px;
    padding:12px;
    text-align:center;
  }
  .stat-num {
    font-size:20px;
    font-weight:900;
    color:#ff6a00;
  }
  .stat-label {
    font-size:12px;
    color:#888;
    margin-top:4px;
  }

  .link-row {
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:12px;
  }
  .link-pill {
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:7px 12px;
    border-radius:20px;
    border:1px solid rgba(255,255,255,0.18);
    background:rgba(255,255,255,0.04);
    font-size:12px;
    color:#ddd;
    text-decoration:none;
  }
  .link-pill:hover {
    border-color:#ff6a00;
    color:#ff6a00;
  }

  .btn-primary {
    display:inline-block;
    padding:8px 14px;
    background:#ff6a00;
    color:#000;
    border-radius:6px;
    font-weight:bold;
    border:none;
    cursor:pointer;
    font-size:13px;
  }
  .btn-primary:hover { background:#ff8c32; }

  .btn-secondary {
    padding:6px 12px;
    background:rgba(255,255,255,0.08);
    border-radius:6px;
    border:1px solid #ff6a00;
    color:#ff6a00;
    cursor:pointer;
    font-weight:bold;
    font-size:13px;
  }
</style>
</head>
<body>

<nav class="navbar">
  <a class="logo" href="/feed">Spacebook</a>
  <div class="nav-links">
    <a href="/home">Home</a>
    <a href="/feed">Feed</a>
    <a href="/profile">Profile</a>
    <a href="/messages">Messages</a>
    <a href="/gallery">Gallery</a>
    <a href="/stories">Stories</a>
    <a href="/listen-together">Listen Together</a>
    <a href="/artist-dashboard">Artist</a>
    <a href="/activity">Activity</a>
    <a href="/logout">Log Out</a>
  </div>
</nav>

<div class="artist-page">
  <div id="profile-root">Loading artist…</div>
</div>

<script>
function getUserIdFromPath() {
  const parts = window.location.pathname.split("/");
  // /artist/:userId → ["", "artist", ":userId"]
  return parts[2] || null;
}

async function loadArtistProfile() {
  const userId = getUserIdFromPath();
  if (!userId) {
    document.getElementById("profile-root").textContent = "Invalid artist URL.";
    return;
  }

  const data = await fetch("/api/artist/" + encodeURIComponent(userId), {
    credentials: "include"
  }).then(r => r.json()).catch(() => null);

  if (!data) {
    document.getElementById("profile-root").textContent = "Artist not found.";
    return;
  }

  const name = data.artistName || data.userName || "Artist";
  const genre = data.genre || "Artist";
  const bio = data.bio || "This artist has not added a bio yet.";
  const avatar = data.profilePic || "/assets/images/default-avatar.png";
  const isVerified = !!data.isVerified;

  const tracks = data.importedTracks || [];
  const shows = data.upcomingShows || [];
  const tipUrl = data.tipUrl || "";
  const soundcloud = data.soundcloudProfile || "";
  const spotify = data.spotifyProfile || "";

  const totalPlays = tracks.reduce((sum, t) => sum + (t.plays || 0), 0);

  const statsHtml = `
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-num">${tracks.length}</div>
        <div class="stat-label">Tracks</div>
      </div>
      <div class="stat-box">
        <div class="stat-num">${shows.length}</div>
        <div class="stat-label">Shows</div>
      </div>
      <div class="stat-box">
        <div class="stat-num">${totalPlays}</div>
        <div class="stat-label">Total Plays</div>
      </div>
    </div>
  `;

  const linksHtml = `
    <div class="link-row">
      ${soundcloud ? `<a class="link-pill" href="${soundcloud}" target="_blank">🎧 SoundCloud</a>` : ""}
      ${spotify ? `<a class="link-pill" href="${spotify}" target="_blank">🎵 Spotify</a>` : ""}
      ${tipUrl ? `<a class="link-pill" href="${tipUrl}" target="_blank">💸 Tip / Support</a>` : ""}
    </div>
  `;

  const tracksHtml = tracks.length
    ? tracks.map((t, i) => `
        <div class="track-item">
          <div style="font-size:13px;color:#f2f2f2;margin-bottom:6px;">
            ${t.title || t.url}
          </div>
          <iframe
            width="100%"
            height="120"
            scrolling="no"
            frameborder="no"
            allow="autoplay"
            src="https://w.soundcloud.com/player/?url=${encodeURIComponent(t.url)}&color=%23ff6a00&auto_play=false"
            onload="registerTrackPlay('${userId}', ${i})"
          ></iframe>
          <div style="font-size:11px;color:#888;margin-top:4px;">
            Plays: <span id="track-plays-${i}">${t.plays || 0}</span>
          </div>
        </div>
      `).join("")
    : `<p style="color:#666;font-size:13px;">No tracks yet.</p>`;

  const showsHtml = shows.length
    ? shows.map(s => `
        <div class="show-item">
          <div style="font-size:13px;font-weight:700;color:#ff6a00;">${s.venue}</div>
          <div style="font-size:12px;color:#888;margin-top:2px;">
            ${s.city} · ${new Date(s.date).toLocaleDateString()}
            ${s.ticketUrl ? `· <a href="${s.ticketUrl}" target="_blank" style="color:#ff6a00;text-decoration:none;">Tickets ↗</a>` : ""}
          </div>
        </div>
      `).join("")
    : `<p style="color:#666;font-size:13px;">No shows yet.</p>`;

  document.getElementById("profile-root").innerHTML = `
    <div class="artist-header">
      <img class="artist-avatar" src="${avatar}"
           onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=ff6a00&color=000'"/>
      <div>
        <div class="artist-name">
          ${name}
          ${isVerified ? '<span class="verified-badge">✓ VERIFIED</span>' : ''}
        </div>
        <div class="artist-genre">${genre}</div>
      </div>
    </div>

    <div class="artist-bio">${bio}</div>

    ${statsHtml}
    ${linksHtml}

    <div style="margin-top:20px;">
      <button class="btn-primary" onclick="openFanMessage('${userId}', '${name.replace(/'/g, "\\'")}')">
        ✉️ Send Fan Message
      </button>
    </div>

    <div class="section-label">Tracks</div>
    <div>${tracksHtml}</div>

    <div class="section-label">Upcoming Shows</div>
    <div>${showsHtml}</div>

    <div id="fan-msg-panel" style="margin-top:24px; display:none;">
      <div class="section-label">Send Fan Message</div>
      <textarea id="fan-msg-input" placeholder="Write your message…"
        style="width:100%;min-height:80px;background:rgba(255,255,255,0.06);border:1px solid #444;border-radius:8px;color:#fff;padding:10px 14px;font-size:13px;box-sizing:border-box;"></textarea>
      <div style="margin-top:10px;display:flex;gap:10px;justify-content:flex-end;">
        <button class="btn-secondary" onclick="closeFanMessage()">Cancel</button>
        <button class="btn-primary" onclick="sendFanMessage('${userId}')">Send</button>
      </div>
    </div>

    <div class="section-label" style="margin-top:28px;">Your messages with this artist</div>
    <div id="fan-msg-history">
      <p style="color:#666;font-size:13px;">Loading your messages…</p>
    </div>
  `;
}

let _playRegistered = {};

async function registerTrackPlay(userId, index) {
  const key = userId + ":" + index;
  if (_playRegistered[key]) return;
  _playRegistered[key] = true;

  try {
    const res = await fetch(`/api/artist/${encodeURIComponent(userId)}/tracks/${index}/play`, {
      method: "POST",
      credentials: "include"
    });
    const data = await res.json().catch(() => ({}));
    if (data && data.success) {
      const span = document.getElementById(`track-plays-${index}`);
      if (span) {
        const current = Number(span.textContent) || 0;
        span.textContent = current + 1;
      }
    }
  } catch (e) {
    // ignore for now
  }
}

function openFanMessage(userId, name) {
  const panel = document.getElementById("fan-msg-panel");
  if (panel) panel.style.display = "block";
  const input = document.getElementById("fan-msg-input");
  if (input) input.value = "";
}

function closeFanMessage() {
  const panel = document.getElementById("fan-msg-panel");
  if (panel) panel.style.display = "none";
}

async function sendFanMessage(userId) {
  const textarea = document.getElementById("fan-msg-input");
  const message = textarea?.value.trim();
  if (!message) {
    alert("Write a message first.");
    return;
  }
  const res = await fetch("/api/artist/" + encodeURIComponent(userId) + "/fan-message", {
    method: "POST",
    credentials: "include",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message })
  });
  const data = await res.json().catch(() => null);
  if (!data || !data.success) {
    alert("Could not send message.");
    return;
  }
  alert("Message sent!");
  closeFanMessage();
  await loadFanMessageHistory(); // refresh history
}

async function loadFanMessageHistory() {
  const userId = getUserIdFromPath();
  if (!userId) return;
  const container = document.getElementById("fan-msg-history");
  if (!container) return;

  const msgs = await fetch("/api/artist/" + encodeURIComponent(userId) + "/fan-messages/me", {
    credentials: "include"
  }).then(r => r.json()).catch(() => []);

  if (!msgs.length) {
    container.innerHTML = `<p style="color:#666;font-size:13px;">You haven't sent any messages to this artist yet.</p>`;
    return;
  }

  container.innerHTML = msgs.map(m => `
    <div style="border-radius:8px;border:1px solid rgba(255,255,255,0.08);padding:10px 12px;margin-bottom:8px;background:rgba(255,255,255,0.02);">
      <div style="font-size:11px;color:#888;margin-bottom:4px;">
        You · ${new Date(m.createdAt).toLocaleDateString()}
      </div>
      <div style="font-size:13px;color:#ddd;margin-bottom:6px;">${m.message}</div>
      ${
        m.reply
          ? `<div style="font-size:12px;color:#ff6a00;border-left:3px solid #ff6a00;padding-left:8px;">
               ${m.reply}
               <div style="font-size:10px;color:#888;margin-top:2px;">
                 Artist reply · ${m.repliedAt ? new Date(m.repliedAt).toLocaleDateString() : ""}
               </div>
             </div>`
          : `<div style="font-size:12px;color:#666;">No reply yet.</div>`
      }
    </div>
  `).join("");
}

loadArtistProfile();
loadFanMessageHistory();
</script>
</body>
</html>
