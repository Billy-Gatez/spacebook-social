<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#000;color:#fff;font-family:Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center}

#viz{width:100%;max-width:700px;height:160px;border-radius:0 0 12px 12px;display:block;border:1px solid rgba(255,106,0,0.25);border-top:none;background:#000}

<body>
<img class="logo" src="https://spacebook.world/SPACEBOOK-WORLD-LOGO.png" alt="Spacebook">
<h1>riff</h1>
<p class="desc">Listen or watch this on Spacebook</p>
<audio id="player" controls><source src="https://raw.githubusercontent.com/Billy-Gatez/spacebook-social/main/media/looperman-l-2921269-0190620-atmospheric-bell-riff-2-main-layer-1772648250873.wav" type="audio/wav"></audio>
<canvas id="viz"></canvas>
<div class="footer"><a href="https://spacebook.world">Published on Spacebook World</a></div>
<script>
(function(){
  var player    = document.getElementById("player");
  var vizCanvas = document.getElementById("viz");
  var vctx      = vizCanvas.getContext("2d");
  var audioCtx, analyser, started = false;
  function initAudio(){
    if(started) return;
    started = true;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    var source = audioCtx.createMediaElementSource(player);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
  }
  player.addEventListener("play", function(){
    initAudio();
    requestAnimationFrame(draw);
  });
  function resizeCanvas(){
    var dpr = Math.min(2, window.devicePixelRatio || 1);
    vizCanvas.width  = Math.floor(vizCanvas.offsetWidth  * dpr);
    vizCanvas.height = Math.floor(vizCanvas.offsetHeight * dpr);
  }
  window.addEventListener("resize", resizeCanvas);
  resizeCanvas();
  function draw(ts){
    resizeCanvas();
    var w = vizCanvas.width, h = vizCanvas.height;
    vctx.clearRect(0,0,w,h);
    vctx.fillStyle = "#000";
    vctx.fillRect(0,0,w,h);
    if(!analyser){ requestAnimationFrame(draw); return; }
    var timeData = new Uint8Array(analyser.fftSize);
    var freqData = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteTimeDomainData(timeData);
    analyser.getByteFrequencyData(freqData);
    var energy = 0;
    for(var k=0;k<64;k++) energy += freqData[k];
    energy = energy / (64*255);
    var pulse = 0.10 + energy * 0.22;
    var bg = vctx.createLinearGradient(0,0,w,h);
    bg.addColorStop(0, "rgba(255,106,0," + (0.06 + pulse) + ")");
    bg.addColorStop(1, "rgba(0,0,0,0.75)");
    vctx.fillStyle = bg;
    vctx.fillRect(0,0,w,h);
    var bins = Math.min(160, freqData.length);
    var barW = w / bins;
    for(var i=0;i<bins;i++){
      var v  = freqData[i] / 255;
      var bh = Math.pow(v, 1.35) * (h * 0.55);
      vctx.fillStyle   = "#ff6a00";
      vctx.globalAlpha = 0.22 + v * 0.78;
      vctx.fillRect(i * barW, h - bh, Math.max(1, barW-1), bh);
    }
    vctx.globalAlpha = 1;
    vctx.lineWidth   = Math.max(2, w * 0.0022);
    vctx.shadowBlur  = Math.max(6, w * 0.01);
    vctx.shadowColor = "rgba(255,106,0,0.65)";
    vctx.strokeStyle = "#ff6a00";
    vctx.beginPath();
    for(var j=0;j<timeData.length;j++){
      var x = (j / (timeData.length-1)) * w;
      var y = (timeData[j] / 255) * (h * 0.55);
      if(j===0) vctx.moveTo(x,y); else vctx.lineTo(x,y);
    }
    vctx.stroke();
    vctx.shadowBlur = 0;
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();
</script>
</body></html>
