  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; color: #f5f5f7; overflow-x: hidden; }

    #starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: -1; }

    #appRoot { min-height: 100vh; padding: 16px; display: flex; flex-direction: column; align-items: center; }

    h1 { margin: 0 0 12px; font-size: 28px; letter-spacing: 0.1em; text-shadow: 0 0 10px rgba(255,138,60,0.8); }

    .toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; justify-content: center; }
    .toolbar select, .toolbar button { padding: 6px 10px; border-radius: 10px; border: none; background: #1a1a25; color: #f5f5f7; cursor: pointer; font-size: 13px; }
    .toolbar input[type="file"] { display: none; }
    .toolbar input[type="color"] { width: 40px; height: 32px; border: none; border-radius: 10px; cursor: pointer; padding: 2px; background: #1a1a25; }
    .toolbar label { padding: 6px 10px; border-radius: 10px; background: #1a1a25; cursor: pointer; color: #f5f5f7; font-size: 13px; }
    .btn-save-project { background: #1a3a1a !important; color: #80ff80 !important; }
    .btn-open-project { background: #1a1a3a !important; color: #80c0ff !important; }
    .btn-pdf { background: #2a1a0a !important; color: #ffb060 !important; }

    .pages-container { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 24px; align-items: center; padding-bottom: 40px; }
    .page { position: relative; display: flex; justify-content: center; width: 100%; }

    .notepad {
      position: relative; width: 420px; height: 560px; border-radius: 24px;
      overflow: hidden; box-shadow: 0 18px 40px rgba(0,0,0,0.55);
      background: var(--paper, #f9e27a); --line-gap: 24px;
    }

    .pad-lines {
      position: absolute; inset: 0; pointer-events: none; opacity: 0.7;
      background-image: repeating-linear-gradient(
        to bottom,
        var(--line, rgba(120,160,220,0.7)) 0,
        var(--line, rgba(120,160,220,0.7)) 1px,
        transparent 1px,
        transparent var(--line-gap)
      );
      background-position-y: var(--line-gap);
    }

   .pad-margin {
  position: absolute;
  top: 0;
  left: 64px;
  width: 4px;
  height: 100%;
  pointer-events: none;
  background: var(--margin, #ff0000);
  display: block;
}

.no-lines .pad-lines {
  display: none;
}

.no-lines .pad-margin {
  display: none;
}


    .pad-content {
      position: relative; z-index: 1; width: 100%; height: 100%;
      padding: var(--line-gap) 24px 24px 80px;
      overflow: hidden; font-size: 16px; color: var(--text, #3b2b10);
      outline: none; white-space: pre-wrap; line-height: var(--line-gap);
    }

    .pad-content img { max-width: 100%; height: auto; display: block; margin: 8px 0; }
    .page.active .notepad { box-shadow: 0 0 0 2px #ff8a3c, 0 18px 40px rgba(0,0,0,0.55); }
    .no-lines .pad-lines { display: none; }

    .deletePageBtn {
      position: absolute; top: 6px; right: 6px; width: 20px; height: 20px;
      border-radius: 999px; border: none; background: rgba(0,0,0,0.4);
      color: #f5f5f7; font-size: 12px; line-height: 20px; text-align: center;
      cursor: pointer; opacity: 0; transition: opacity 0.15s ease; z-index: 2;
    }
    .page:hover .deletePageBtn { opacity: 1; }

<script>
// ══════════════════════════════════════
//  STARFIELD — gentle slow drift
// ══════════════════════════════════════
const sfCanvas = document.getElementById("starfield");
const sfCtx    = sfCanvas.getContext("2d");
function resizeSF() { sfCanvas.width = window.innerWidth; sfCanvas.height = window.innerHeight; }
resizeSF();
window.addEventListener("resize", resizeSF);

const STARS = Array.from({length: 250}, () => ({
  x: Math.random(),   // stored as 0-1 fraction
  y: Math.random(),
  r: Math.random() * 1.2 + 0.2,
  speed: Math.random() * 0.00008 + 0.00003,   // fraction of height per frame — very slow
  phase: Math.random() * Math.PI * 2
}));

let sfFrame = 0;
(function sfLoop() {
  sfCtx.clearRect(0, 0, sfCanvas.width, sfCanvas.height);
  sfFrame++;
  STARS.forEach(s => {
    s.y += s.speed;
    if (s.y > 1) { s.y = 0; s.x = Math.random(); }
    const alpha = 0.5 + 0.4 * Math.sin(s.phase + sfFrame * 0.008);
    sfCtx.fillStyle = `rgba(255,255,255,${alpha})`;
    sfCtx.beginPath();
    sfCtx.arc(s.x * sfCanvas.width, s.y * sfCanvas.height, s.r, 0, Math.PI*2);
    sfCtx.fill();
  });
  requestAnimationFrame(sfLoop);
})();

// ══════════════════════════════════════
//  APP STATE
// ══════════════════════════════════════
let currentEditor = document.querySelector(".pad-content");
let linesOn = true;
let emojis  = [];
let emojiCat = "all";

const pagesContainer   = document.getElementById("pages");
const themeSelect      = document.getElementById("themeSelect");
const fontSelect       = document.getElementById("fontSelect");
const sizeSelect       = document.getElementById("sizeSelect");
const textColorInput   = document.getElementById("textColor");
const imageInput       = document.getElementById("imageInput");
const emojiToggleBtn   = document.getElementById("emojiToggle");
const emojiPanel       = document.getElementById("emojiPanel");
const emojiGrid        = document.getElementById("emojiGrid");
const emojiSearch      = document.getElementById("emojiSearch");
const addPageBtn       = document.getElementById("addPageBtn");
const deletePageBtn    = document.getElementById("deletePageBtn");
const savePdfBtn       = document.getElementById("savePdfBtn");
const saveProjectBtn   = document.getElementById("saveProjectBtn");
const openProjectInput = document.getElementById("openProjectInput");
const toggleLinesBtn   = document.getElementById("toggleLinesBtn");
const pageSound        = document.getElementById("pageSound");

// ══════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════
function setActive(editor) {
  currentEditor = editor;
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  editor.closest(".page").classList.add("active");
}

function applyLines(pad) { pad.classList.toggle("no-lines", !linesOn); }

function getTheme(pad) {
  return [...pad.classList].find(c => c.startsWith("theme-")) || "theme-classic";
}

// ── Page state snapshot / restore ──
function getPageState(pageEl) {
  const pad = pageEl.querySelector(".notepad");
  const ed  = pageEl.querySelector(".pad-content");
  return {
    html:       ed.innerHTML,
    theme:      getTheme(pad),
    fontSize:   ed.style.fontSize   || "16px",
    lineHeight: ed.style.lineHeight || "24px",
    fontFamily: ed.style.fontFamily || "system-ui",
    color:      ed.style.color      || "",
    linesOn:    !pad.classList.contains("no-lines")
  };
}

function applyPageState(pageEl, s) {
  const pad = pageEl.querySelector(".notepad");
  const ed  = pageEl.querySelector(".pad-content");
  ed.innerHTML     = s.html || "";
  [...pad.classList].filter(c => c.startsWith("theme-")).forEach(c => pad.classList.remove(c));
  pad.classList.add(s.theme || "theme-classic");
  ed.style.fontSize   = s.fontSize   || "16px";
  ed.style.lineHeight = s.lineHeight || "24px";
  ed.style.fontFamily = s.fontFamily || "system-ui";
  ed.style.color      = s.color      || "";
  const gap = parseFloat(s.lineHeight) || 24;
  pad.style.setProperty("--line-gap", gap + "px");
  pad.classList.toggle("no-lines", s.linesOn === false);
}

// ══════════════════════════════════════
//  OVERFLOW → new page
//  Only triggers when text ACTUALLY goes
//  past the visible bottom of the notepad
// ══════════════════════════════════════
function checkOverflow(editor) {
  const pad = editor.closest(".notepad");
  // scrollHeight is the full content height; clientHeight is the visible area.
  // We only create a new page when content has truly overflowed — with a 2px buffer.
  if (editor.scrollHeight > editor.clientHeight + 2) {
    // Trim the last word/char that caused overflow back into new page
    const newEd = buildPage();
    setActive(newEd);
    newEd.focus();
  }
}

// ══════════════════════════════════════
//  TOOLBAR EVENTS
// ══════════════════════════════════════
pagesContainer.addEventListener("mousedown", e => {
  const ed = e.target.closest(".pad-content");
  if (ed) setActive(ed);
});

pagesContainer.addEventListener("contextmenu", e => {
  const img = e.target.closest("img");
  if (img && confirm("Delete image?")) { e.preventDefault(); img.remove(); }
});

themeSelect.addEventListener("change", () => {
  const pad = currentEditor.closest(".notepad");
  [...pad.classList].filter(c => c.startsWith("theme-")).forEach(c => pad.classList.remove(c));
  pad.classList.add(themeSelect.value);
});

fontSelect.addEventListener("change", () => {
  currentEditor.style.fontFamily = fontSelect.value;
  currentEditor.focus();
});

sizeSelect.addEventListener("change", () => {
  const size = parseInt(sizeSelect.value);
  const gap  = Math.ceil(size * 1.6);
  const pad  = currentEditor.closest(".notepad");
  currentEditor.style.fontSize   = size + "px";
  currentEditor.style.lineHeight = gap  + "px";
  pad.style.setProperty("--line-gap", gap + "px");
  currentEditor.focus();
});

textColorInput.addEventListener("input", () => {
  currentEditor.style.color = textColorInput.value;
  currentEditor.focus();
});

document.querySelectorAll("button[data-cmd]").forEach(btn =>
  btn.addEventListener("click", () => { document.execCommand(btn.dataset.cmd, false, null); currentEditor.focus(); })
);

toggleLinesBtn.addEventListener("click", () => {
  linesOn = !linesOn;
  toggleLinesBtn.textContent = linesOn ? "Lines Off" : "Lines On";
  document.querySelectorAll(".notepad").forEach(applyLines);
});

imageInput.addEventListener("change", () => {
  const file = imageInput.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = document.createElement("img");
    img.src = ev.target.result;
    img.style.cssText = "max-width:100%;height:auto;display:block;margin:8px 0;";
    const sel = window.getSelection();
    if (sel && sel.rangeCount && currentEditor.contains(sel.getRangeAt(0).startContainer)) {
      const r = sel.getRangeAt(0); r.deleteContents(); r.insertNode(img); r.collapse(false);
    } else { currentEditor.appendChild(img); }
    currentEditor.focus();
  };
  reader.readAsDataURL(file);
  imageInput.value = "";
});

// ══════════════════════════════════════
//  EMOJI
// ══════════════════════════════════════
function insertEmoji(char) {
  currentEditor.focus();
  if (!document.execCommand("insertText", false, char)) {
    const sel = window.getSelection();
    if (sel && sel.rangeCount) {
      const r = sel.getRangeAt(0); r.deleteContents();
      r.insertNode(document.createTextNode(char)); r.collapse(false);
    } else { currentEditor.appendChild(document.createTextNode(char)); }
  }
}

function renderEmojis() {
  const term = emojiSearch.value.toLowerCase();
  emojiGrid.innerHTML = "";
  emojis
    .filter(e => emojiCat === "all" || e.cat === emojiCat)
    .filter(e => !term || e.name.toLowerCase().includes(term))
    .forEach(e => {
      const d = document.createElement("div");
      d.className = "emoji-item"; d.textContent = e.char; d.title = e.name;
      d.addEventListener("mousedown", ev => { ev.preventDefault(); insertEmoji(e.char); });
      emojiGrid.appendChild(d);
    });
}

document.querySelectorAll(".emoji-cats button").forEach(btn =>
  btn.addEventListener("click", () => { emojiCat = btn.dataset.cat; renderEmojis(); })
);
emojiSearch.addEventListener("input", renderEmojis);
emojiToggleBtn.addEventListener("click", () => {
  emojiPanel.style.display = emojiPanel.style.display === "flex" ? "none" : "flex";
  if (emojiPanel.style.display === "flex") renderEmojis();
});

async function loadAllEmojis() {
  try {
    const r = await fetch("https://raw.githubusercontent.com/github/gemoji/master/db/emoji.json");
    const d = await r.json();
    emojis = d.filter(e => e.emoji).map(e => ({ char: e.emoji, name: e.description||"", cat: e.category||"Symbols" }));
    renderEmojis();
  } catch(err) { console.warn("Emoji load failed", err); }
}

// ══════════════════════════════════════
//  PAGE MANAGEMENT
// ══════════════════════════════════════
function buildPage(state) {
  const page = document.createElement("div");
  page.className = "page";
  page.innerHTML = `
    <button class="deletePageBtn">✕</button>
    <div class="notepad theme-classic">
      <div class="pad-lines"></div>
      <div class="pad-margin"></div>
      <div class="pad-content" contenteditable="true" spellcheck="true"></div>
    </div>`;
  pagesContainer.appendChild(page);
  const ed = page.querySelector(".pad-content");
  if (state) applyPageState(page, state);
  else applyLines(page.querySelector(".notepad"));
  // ── attach overflow listener ──
  ed.addEventListener("input", () => checkOverflow(ed));
  setActive(ed);
  pageSound && pageSound.play().catch(()=>{});
  return ed;
}

addPageBtn.addEventListener("click", () => buildPage().focus());

function removePage(page) {
  const all = document.querySelectorAll(".page");
  if (all.length === 1) {
    if (confirm("Clear page?")) page.querySelector(".pad-content").innerHTML = "";
    return;
  }
  if (confirm("Delete page?")) {
    page.remove();
    const first = document.querySelector(".page .pad-content");
    if (first) setActive(first);
  }
}

deletePageBtn.addEventListener("click", () => {
  const active = document.querySelector(".page.active");
  if (active) removePage(active);
});

pagesContainer.addEventListener("click", e => {
  if (e.target.classList.contains("deletePageBtn")) removePage(e.target.closest(".page"));
});

// ══════════════════════════════════════
//  PDF EXPORT
// ══════════════════════════════════════
savePdfBtn.addEventListener("click", async () => {
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF("p", "pt", "a4");
  const pads = Array.from(document.querySelectorAll(".notepad"));

  for (let i = 0; i < pads.length; i++) {
    const pad = pads[i];
    const hasLines = !pad.classList.contains("no-lines");
    const computedStyle = getComputedStyle(pad);
    const paperColor = computedStyle.getPropertyValue("--paper").trim() || "#f9e27a";
    const lineColor = computedStyle.getPropertyValue("--line").trim() || "rgba(120, 160, 220, 0.7)";
    const marginColor = computedStyle.getPropertyValue("--margin").trim() || "rgba(220, 80, 80, 0.9)";
    const lineGap = parseFloat(computedStyle.getPropertyValue("--line-gap")) || 24;

    const canvas = await html2canvas(pad, {
      scale: 2,
      useCORS: true,
      logging: false,
      backgroundColor: paperColor
    });

    if (hasLines) {
      const ctx = canvas.getContext("2d");
      const scale = 2;
      const gap = lineGap * scale;

      ctx.save();
      ctx.strokeStyle = lineColor;
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.7;

      for (let y = 0; y <= canvas.height; y += gap) {
        ctx.beginPath();
        ctx.moveTo(0, Math.round(y) + 0.5);
        ctx.lineTo(canvas.width, Math.round(y) + 0.5);
        ctx.stroke();
      }

      ctx.globalAlpha = 1;
      ctx.strokeStyle = marginColor;
      ctx.lineWidth = 4;
      const marginX = Math.round(64 * scale);
      ctx.beginPath();
      ctx.moveTo(marginX + 0.5, 0);
      ctx.lineTo(marginX + 0.5, canvas.height);
      ctx.stroke();

      ctx.restore();
    }

    const imgData = canvas.toDataURL("image/png");
    const pageWidth = pdf.internal.pageSize.getWidth();
    const pageHeight = pdf.internal.pageSize.getHeight();
    const ratio = Math.min(pageWidth / canvas.width, pageHeight / canvas.height);
    const imgWidth = canvas.width * ratio;
    const imgHeight = canvas.height * ratio;
    const x = (pageWidth - imgWidth) / 2;
    const y = (pageHeight - imgHeight) / 2;

    if (i > 0) pdf.addPage();
    pdf.addImage(imgData, "PNG", x, y, imgWidth, imgHeight);
  }

  pdf.save("spacebook-pages.pdf");
});

// ══════════════════════════════════════
//  SAVE / OPEN PROJECT
// ══════════════════════════════════════
saveProjectBtn.addEventListener("click", () => {
  const pages = [...document.querySelectorAll(".page")].map(getPageState);
  const blob  = new Blob([JSON.stringify({ version:1, app:"SPACEPAD", savedAt:new Date().toISOString(), linesOn, pages }, null, 2)], { type:"application/json" });
  const a = Object.assign(document.createElement("a"), { href: URL.createObjectURL(blob), download:"my-spacepad.spacepad" });
  a.click(); URL.revokeObjectURL(a.href);
});

openProjectInput.addEventListener("change", () => {
  const file = openProjectInput.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const proj = JSON.parse(ev.target.result);
      if (proj.app !== "SPACEPAD") { alert("Not a valid SPACEPAD file!"); return; }
      pagesContainer.innerHTML = "";
      linesOn = proj.linesOn !== false;
      toggleLinesBtn.textContent = linesOn ? "Lines Off" : "Lines On";
      proj.pages.forEach((state, idx) => {
        const page = document.createElement("div");
        page.className = "page";
        page.innerHTML = `
          <button class="deletePageBtn">✕</button>
          <div class="notepad theme-classic">
            <div class="pad-lines"></div>
            <div class="pad-margin"></div>
            <div class="pad-content" contenteditable="true" spellcheck="true"></div>
          </div>`;
        pagesContainer.appendChild(page);
        applyPageState(page, state);
        const ed = page.querySelector(".pad-content");
        ed.addEventListener("input", () => checkOverflow(ed));
        if (idx === 0) setActive(ed);
      });
    } catch(err) { alert("Failed to open: " + err.message); }
  };
  reader.readAsText(file);
  openProjectInput.value = "";
});
