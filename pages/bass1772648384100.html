  body{background:#000;color:#fff;font-family:Arial,sans-serif;padding:40px 20px;text-align:center;max-width:760px;margin:auto;}
  img.logo{width:160px;margin-bottom:24px;filter:drop-shadow(0 0 10px rgba(255,107,0,0.4));}

<body>
<img class="logo" src="https://spacebook.world/SPACEBOOK-WORLD-LOGO.png" alt="Spacebook">
<h1>bass</h1>
<p>Listen or watch this on Spacebook</p>
<audio id="player" controls><source src="https://raw.githubusercontent.com/Billy-Gatez/spacebook-social/main/media/looperman-l-3023396-0186058-experimental-future-bass-arp-loop-1.wav"></audio>
<canvas id="viz"></canvas>
<a href="https://spacebook.world">Published on Spacebook World</a>
<script>
(function(){
  var player=document.getElementById("player");
  var c=document.getElementById("viz");
  var ctx=c.getContext("2d");
  var actx,an,started=false;
  function init(){
    if(started)return;
    started=true;
    actx=new(window.AudioContext||window.webkitAudioContext)();
    an=actx.createAnalyser();
    an.fftSize=2048;
    var s=actx.createMediaElementSource(player);
    s.connect(an);
    an.connect(actx.destination);
  }
  player.addEventListener("play",function(){init();requestAnimationFrame(draw);});
  function resize(){
    var dpr=Math.min(2,window.devicePixelRatio||1);
    c.width=Math.floor(c.offsetWidth*dpr);
    c.height=Math.floor(c.offsetHeight*dpr);
  }
  window.addEventListener("resize",resize);
  resize();
  function draw(ts){
    resize();
    var w=c.width,h=c.height;
    ctx.clearRect(0,0,w,h);
    ctx.fillStyle="#000";
    ctx.fillRect(0,0,w,h);
    if(!an){requestAnimationFrame(draw);return;}
    var td=new Uint8Array(an.fftSize);
    var fd=new Uint8Array(an.frequencyBinCount);
    an.getByteTimeDomainData(td);
    an.getByteFrequencyData(fd);
    var energy=0;
    for(var k=0;k<64;k++)energy+=fd[k];
    energy=energy/(64*255);
    var pulse=0.10+energy*0.22;
    var bg=ctx.createLinearGradient(0,0,w,h);
    bg.addColorStop(0,"rgba(255,106,0,"+(0.06+pulse)+")");
    bg.addColorStop(1,"rgba(0,0,0,0.75)");
    ctx.fillStyle=bg;
    ctx.fillRect(0,0,w,h);
    var bins=Math.min(160,fd.length);
    var bw=w/bins;
    for(var i=0;i<bins;i++){
      var v=fd[i]/255;
      var bh=Math.pow(v,1.35)*(h*0.55);
      ctx.fillStyle="#ff6a00";
      ctx.globalAlpha=0.22+v*0.78;
      ctx.fillRect(i*bw,h-bh,Math.max(1,bw-1),bh);
    }
    ctx.globalAlpha=1;
    ctx.lineWidth=Math.max(2,w*0.0022);
    ctx.shadowBlur=Math.max(6,w*0.01);
    ctx.shadowColor="rgba(255,106,0,0.65)";
    ctx.strokeStyle="#ff6a00";
    ctx.beginPath();
    for(var j=0;j<td.length;j++){
      var x=(j/(td.length-1))*w;
      var y=(td[j]/255)*(h*0.55);
      if(j===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    }
    ctx.stroke();
    ctx.shadowBlur=0;
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();
</script>
